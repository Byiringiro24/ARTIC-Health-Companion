# ─── Nginx config for ARTIC Health Companion (HMS) ───────────────────────────
# This file adds HMS to the SAME Nginx instance that serves the VMS project.
# VMS already uses:  fleet.yourcompany.rw → ports 3000 / 4000
# HMS will use:      hms.yourcompany.rw   → ports 3001 / 4001
#
# HOW TO DEPLOY:
# 1. Copy this file to /etc/nginx/sites-available/artic-hms
# 2. Run: sudo ln -s /etc/nginx/sites-available/artic-hms /etc/nginx/sites-enabled/
# 3. Run: sudo nginx -t
# 4. Run: sudo systemctl reload nginx
# 5. Get SSL: sudo certbot --nginx -d hms.yourcompany.rw
#
# NOTE: The VMS nginx config is untouched. This is a NEW server block only.

server {
    listen 80;
    server_name hms.yourcompany.rw;  # <-- change to your actual domain or IP

    # Redirect HTTP → HTTPS (certbot will auto-add this after SSL setup)
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name hms.yourcompany.rw;

    # SSL (certbot will fill these in automatically)
    ssl_certificate     /etc/letsencrypt/live/hms.yourcompany.rw/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hms.yourcompany.rw/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_session_cache shared:SSL:10m;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;

    client_max_body_size 10M;

    # ── HMS Frontend (Next.js on port 3001) ──────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
    }

    # ── HMS Backend REST API (port 4001) ─────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:4001;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30;

        # Rate limiting at Nginx level (extra protection)
        limit_req zone=hms_api burst=20 nodelay;
    }

    # ── Health check (public, no auth) ───────────────────────────────────────
    location = /health {
        proxy_pass http://127.0.0.1:4001/health;
        access_log off;
    }
}

# Rate limit zone — add to /etc/nginx/nginx.conf http block if not present
# limit_req_zone $binary_remote_addr zone=hms_api:10m rate=10r/s;
